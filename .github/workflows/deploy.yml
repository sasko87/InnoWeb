name: Deploy Vite to OrangeHost via FTP

on:
  push:
    branches:
      - main # Runs when you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20" # your Node version

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Build Vite project
      - name: Build Vite app
        run: npm run build

      # Step 5: Deploy via FTP
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist # Vite build folder
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
          passive: true # enable passive mode (important for shared hosting)
          log-level: verbose # detailed logs for debugging
          exclude: .gitignore,.github
